# 本地开发环境 Docker Compose 配置
# 只包含 Postgres 数据库，Next.js 使用 npm run dev 运行

services:
  db:
    image: postgres:15-alpine
    container_name: cooking_plan_db
    environment:
      POSTGRES_DB: cooking_plan
      POSTGRES_USER: cooking_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cooking_user -d cooking_plan"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
